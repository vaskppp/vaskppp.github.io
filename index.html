<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Log Cloud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* CSS de base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue: #1a56db; --blue-light: #eff4ff; --blue-mid: #c7d7fd; --green: #057a55; --green-light:#f3faf7; --red: #c81e1e; --red-light: #fdf2f2; --amber: #92400e; --amber-light:#fffbeb; --text: #111928; --text-2: #4b5563; --text-3: #9ca3af; --border: #e5e7eb; --bg: #f9fafb; --surface: #ffffff; --radius: 8px; --radius-lg: 12px; --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04); }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 32px 16px; }
    #app { max-width: 960px; margin: 0 auto; }
    
    /* Header & Stats */
    .app-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
    .stats-bar { display: flex; gap: 12px; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 16px; min-width: 100px; }
    .stat-label { font-size: 11px; text-transform: uppercase; color: var(--text-3); font-weight: 600; }
    .stat-value { font-size: 20px; font-weight: 600; color: var(--blue); }

    /* Formulaire */
    .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
    .input-grid { display: grid; grid-template-columns: 0.8fr 2fr 1.1fr 0.9fr 0.9fr; gap: 12px; margin-bottom: 16px; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: var(--text-3); margin-bottom: 5px; text-transform: uppercase; }
    .field input { width: 100%; padding: 9px; border: 1px solid var(--border); border-radius: var(--radius); }
    
    /* Boutons */
    .btn { padding: 10px 20px; border-radius: var(--radius); border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-primary { background: var(--blue); color: white; }
    .btn-primary:hover { background: #1648c8; }
    
    /* Liste */
    .list-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
    .project-item { display: grid; grid-template-columns: 0.8fr 2fr 1.1fr 1fr 100px; padding: 12px 16px; border-bottom: 1px solid var(--border); align-items: center; }
    .proj-num { background: var(--blue-light); color: var(--blue); padding: 2px 8px; border-radius: 10px; font-size: 12px; font-family: monospace; }
    
    /* Toast */
    #toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: var(--radius); color: white; opacity: 0; transition: 0.3s; z-index: 1000; }
    #toast.show { opacity: 1; }
    .success { background: var(--green); }
    .error { background: var(--red); }
  </style>
</head>
<body>

<div id="toast"></div>

<div id="app">
  <div class="app-header">
    <h1 class="app-title">Project <span>Log Cloud</span></h1>
    <div class="stats-bar">
      <div class="stat"><div class="stat-label">Projets</div><div class="stat-value" id="statCount">0</div></div>
      <div class="stat"><div class="stat-label">Total</div><div class="stat-value" id="statTotal">0h</div></div>
    </div>
  </div>

  <div class="form-card" id="formCard">
    <div class="input-grid">
      <div class="field"><label>N° Projet</label><input type="text" id="projNum" placeholder="P-101"></div>
      <div class="field"><label>Nom</label><input type="text" id="projName" placeholder="Description..."></div>
      <div class="field"><label>Date</label><input type="date" id="startDate"></div>
      <div class="field"><label>Début</label><input type="time" id="startTime"></div>
      <div class="field"><label>Fin</label><input type="time" id="endTime"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" id="submitBtn">+ Ajouter l'entrée</button>
    </div>
  </div>

  <div class="list-card">
    <div id="projectList"></div>
  </div>
</div>

<script>
  // 1. Initialisation Supabase avec tes clés
  const SUPABASE_URL = 'https://dfkhnavpryeobacfpxbx.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRma2huYXZwcnllb2JhY2ZweGJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNTExMjYsImV4cCI6MjA4OTkyNzEyNn0.wF8ewEVTw3Y0ELWOGOpQLCiBDePEhsp8mZjM8O_z2iU';
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let projects = [];

  // 2. Charger les données au démarrage
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('startDate').value = new Date().toISOString().split('T')[0];
    loadProjects();
  });

  async function loadProjects() {
    const { data, error } = await _supabase
      .from('projects')
      .select('*')
      .order('date', { ascending: false });

    if (error) {
      showToast("Erreur de chargement", "error");
      console.error(error);
    } else {
      projects = data;
      renderList();
      updateStats();
    }
  }

  // 3. Ajouter un projet
  document.getElementById('submitBtn').addEventListener('click', async () => {
    const payload = {
      num: document.getElementById('projNum').value.trim(),
      name: document.getElementById('projName').value.trim(),
      date: document.getElementById('startDate').value,
      start: document.getElementById('startTime').value,
      end: document.getElementById('endTime').value
    };

    if (!payload.num || !payload.name) {
      showToast("Remplis au moins le Numéro et le Nom", "error");
      return;
    }

    const { error } = await _supabase.from('projects').insert([payload]);

    if (error) {
      showToast("Erreur lors de l'ajout", "error");
      console.error(error);
    } else {
      showToast("Projet ajouté avec succès !");
      resetForm();
      loadProjects();
    }
  });

  // 4. Fonctions d'affichage
  function renderList() {
    const listEl = document.getElementById('projectList');
    if (projects.length === 0) {
      listEl.innerHTML = '<div style="padding:20px; text-align:center; color:#9ca3af;">Aucun projet enregistré</div>';
      return;
    }

    listEl.innerHTML = projects.map(p => `
      <div class="project-item">
        <span><span class="proj-num">${p.num}</span></span>
        <span style="font-weight:500;">${p.name}</span>
        <span style="color:#6b7280; font-size:13px;">${p.date}</span>
        <span style="font-family:monospace;">${p.start || '--'} - ${p.end || '--'}</span>
        <button class="btn" style="color:red; background:none;" onclick="deleteItem(${p.id})">Supprimer</button>
      </div>
    `).join('');
  }

  async function deleteItem(id) {
    if (confirm("Supprimer cette ligne ?")) {
      const { error } = await _supabase.from('projects').delete().eq('id', id);
      if (!error) loadProjects();
    }
  }

  function updateStats() {
    document.getElementById('statCount').textContent = projects.length;
  }

  function resetForm() {
    document.getElementById('projNum').value = '';
    document.getElementById('projName').value = '';
    document.getElementById('startTime').value = '';
    document.getElementById('endTime').value = '';
  }

  function showToast(msg, type = "success") {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => t.className = '', 3000);
  }
</script>

</body>
</html>
